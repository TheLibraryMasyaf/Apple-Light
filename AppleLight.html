<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Apple Light</title>
  <style>
    :root {
      color-scheme: only light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Consolas", "Courier New", monospace;
      background: #111;
      color: #f3f3f3;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px;
    }

    h1 {
      margin: 4px 0;
      letter-spacing: 2px;
      font-size: 22px;
    }

    .hud {
      width: min(960px, 96vw);
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      font-size: 14px;
      align-items: center;
    }

    .hud > div,
    .hud > button {
      border: 2px solid #f3f3f3;
      background: #000;
      color: #fff;
      padding: 8px;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hud button {
      cursor: pointer;
    }

    .hud button:hover {
      background: #222;
    }

    #game {
      width: min(960px, 96vw);
      height: auto;
      border: 4px solid #f3f3f3;
      image-rendering: pixelated;
      background: #000;
    }

    .tip {
      width: min(960px, 96vw);
      border: 2px solid #f3f3f3;
      background: #000;
      padding: 8px;
      font-size: 13px;
      line-height: 1.4;
    }

    .panel {
      width: min(960px, 96vw);
      border: 2px solid #f3f3f3;
      background: #000;
      padding: 8px;
      font-size: 13px;
      line-height: 1.4;
    }

    .panel h3 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .leaderboard {
      display: grid;
      gap: 4px;
      max-height: 160px;
      overflow: auto;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.9fr;
      gap: 8px;
      border-top: 1px solid #555;
      padding-top: 4px;
    }

    .leaderboard-row:first-child {
      border-top: none;
      padding-top: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.86);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .overlay.hidden {
      display: none;
    }

    .start-card {
      width: min(460px, 92vw);
      border: 3px solid #fff;
      background: #000;
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .start-title {
      margin: 0;
      font-size: 20px;
      letter-spacing: 1px;
      text-align: center;
    }

    .start-input {
      width: 100%;
      border: 2px solid #fff;
      background: #111;
      color: #fff;
      padding: 10px;
      font: inherit;
    }

    .start-btn {
      border: 2px solid #fff;
      background: #000;
      color: #fff;
      padding: 10px;
      font: inherit;
      cursor: pointer;
    }

    .start-btn:hover {
      background: #222;
    }

    .start-note {
      font-size: 12px;
      opacity: 0.9;
      text-align: center;
    }

    @media (max-width: 900px) {
      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Apple Light</h1>
    <div class="hud" id="hud">
      <div>玩家：<span id="playerText">未开始</span></div>
      <div>关卡：<span id="levelText">1/32</span></div>
      <div>灯态：<span id="lightText">明</span></div>
      <div>本关计时：<span id="levelTimerText">0.0s</span></div>
      <div>总计时：<span id="totalTimerText">0.0s</span></div>
      <button id="resetBtn" type="button">重置本关</button>
    </div>

    <canvas id="game" width="960" height="540" aria-label="Apple Light 游戏画布"></canvas>

    <div class="tip" id="tipText">
      A/D 移动，空格跳跃。F 键触发开关切换明暗。W/S 在有梯子的关卡中可爬下梯子。
    </div>
  </div>

  <div class="overlay" id="startOverlay" role="dialog" aria-modal="true" aria-label="输入玩家名开始游戏">
    <div class="start-card">
      <h2 class="start-title">开始游戏</h2>
      <input id="playerNameInput" class="start-input" type="text" maxlength="20" placeholder="请输入玩家名（1-20字）" />
      <button id="startGameBtn" class="start-btn" type="button">进入游戏</button>
      <div class="start-note">输入玩家名后点击“进入游戏”即可开始。</div>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const playerText = document.getElementById('playerText');
      const levelText = document.getElementById('levelText');
      const lightText = document.getElementById('lightText');
      const levelTimerText = document.getElementById('levelTimerText');
      const totalTimerText = document.getElementById('totalTimerText');
      const tipText = document.getElementById('tipText');
      const resetBtn = document.getElementById('resetBtn');
      const startOverlay = document.getElementById('startOverlay');
      const playerNameInput = document.getElementById('playerNameInput');
      const startGameBtn = document.getElementById('startGameBtn');

      const UNIT = 10;
      const U = (v) => v * UNIT;

      const WORLD = {
        width: U(96),
        height: U(54),
        gravity: U(220),
      };

      const PLAYER = {
        w: U(2.8),
        h: U(6),
        moveSpeed: U(30),
        jumpSpeed: U(92),
        climbSpeed: U(22),
      };

      const TOTAL_NORMAL_LEVELS = 31;
      const TOTAL_LEVELS = 32;
      const morseTarget31 = '.- .--. .--. .-.. . .-.. .. --. .... -'.replace(/\s+/g, '') + '.-';

      const keys = {
        a: false,
        d: false,
        w: false,
        s: false,
        space: false,
        f: false,
      };

      const state = {
        playerName: '',
        gameStarted: false,
        currentLevelIndex: 0,
        levels: [],
        cameraX: 0,
        cameraY: 0,
        totalTime: 0,
        levelTime: 0,
        clearStates: Array(TOTAL_NORMAL_LEVELS).fill(null),
        hiddenUnlocked: false,
        gameEnded: false,
        rewardUnlocked: false,
        player: {
          x: 80,
          y: 0,
          vx: 0,
          vy: 0,
          onGround: false,
          onLadder: false,
          justJumped: false,
          facing: 1,
        },
        nearSwitch: null,
        shouldJump: false,
      };

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function rectIntersect(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function makeBaseLevel(i) {
        const levelNum = i + 1;
        const baseY = U(45);
        const fixed = [
          { x: U(0), y: baseY, w: WORLD.width, h: U(9) },
          { x: U(11), y: U(36), w: U(10), h: U(1.8) },
          { x: U(28), y: U(29), w: U(11), h: U(1.8) },
          { x: U(47), y: U(22), w: U(12), h: U(1.8) },
          { x: U(68), y: U(30), w: U(12), h: U(1.8) },
          { x: U(88), y: U(22), w: U(13), h: U(1.8) },
        ];

        const offset = U((i % 3) * 1.2);
        const bright = [
          { x: U(18), y: U(34) - offset, w: U(8.5), h: U(1.6) },
          { x: U(37), y: U(27) + offset, w: U(9), h: U(1.6) },
          { x: U(57), y: U(20) - offset, w: U(10), h: U(1.6) },
          { x: U(75), y: U(28) + offset, w: U(10), h: U(1.6) },
          { x: U(80), y: U(18), w: U(7.5), h: U(1.6) },
        ];

        const dark = [
          { x: U(18), y: U(38) + offset, w: U(9), h: U(1.6) },
          { x: U(39), y: U(31) - offset, w: U(9), h: U(1.6) },
          { x: U(59), y: U(26) + offset, w: U(10), h: U(1.6) },
          { x: U(75), y: U(20) - offset, w: U(10), h: U(1.6) },
          { x: U(80), y: U(34), w: U(8.5), h: U(1.6) },
        ];

        const switches = [
          { x: U(13), y: U(34), w: U(1.6), h: U(3) },
          { x: U(32), y: U(27), w: U(1.6), h: U(3) },
          { x: U(52), y: U(20), w: U(1.6), h: U(3) },
        ];

        fixed.push({ x: U(85), y: U(22), w: U(10), h: U(1.8) });

        const ladders = [];
        if (levelNum >= 11) {
          ladders.push({ x: U(50), y: U(22), w: U(1.6), h: U(18) });
          if (levelNum >= 16) {
            ladders.push({ x: U(75), y: U(22), w: U(1.6), h: U(20) });
          }
        }

        const movingPlatforms = [];
        if (levelNum >= 21) {
          movingPlatforms.push({
            x: U(62),
            y: U(28),
            w: U(8),
            h: U(1.6),
            minX: U(57),
            maxX: U(75),
            speed: U(6 + (i % 3) * 1.5),
            dir: 1,
          });
          movingPlatforms.push({
            x: U(82),
            y: U(20),
            w: U(8),
            h: U(1.6),
            minX: U(75),
            maxX: U(88),
            speed: U(7 + (i % 3) * 1.2),
            dir: -1,
          });
        }

        if (levelNum >= 6) {
          fixed.push({ x: U(26), y: U(32 + (i % 2) * 2), w: U(8), h: U(1.8) });
        }
        if (levelNum >= 14) {
          bright.push({ x: U(45), y: U(16), w: U(8.5), h: U(1.6) });
          dark.push({ x: U(44), y: U(38), w: U(9.5), h: U(1.6) });
        }
        if (levelNum >= 25) {
          bright.push({ x: U(72), y: U(14), w: U(8), h: U(1.6) });
          dark.push({ x: U(71), y: U(40), w: U(9), h: U(1.6) });
        }

        return {
          id: levelNum,
          name: `关卡 ${levelNum}`,
          start: { x: U(6), y: U(38) },
          lightState: i % 2 === 0 ? 'bright' : 'dark',
          fixed,
          bright,
          dark,
          switches,
          ladders,
          movingPlatforms,
          exit: { x: U(90), y: U(18), w: U(3.6), h: U(5) },
          hint: levelNum < 11
            ? 'A/D 移动，空格跳跃，F 键触发开关。'
            : levelNum < 21
              ? '本阶段加入梯子：W/S 可爬下梯子。'
              : '本阶段加入移动平台：注意时机与切换节奏。',
        };
      }

      function makeHiddenLevel() {
        return {
          id: 32,
          name: '隐藏关',
          start: { x: U(6), y: U(38) },
          lightState: 'dark',
          fixed: [{ x: U(0), y: U(45), w: WORLD.width, h: U(9) }],
          bright: [],
          dark: [],
          switches: [],
          ladders: [],
          movingPlatforms: [],
          exit: { x: U(90), y: U(38), w: U(3.6), h: U(5) },
          hint: '隐藏关：沿底部平台前进至终点，获得最终奖励。',
          isHidden: true,
        };
      }

      function buildLevels() {
        state.levels = [];
        for (let i = 0; i < TOTAL_NORMAL_LEVELS; i += 1) {
          state.levels.push(makeBaseLevel(i));
        }
        state.levels.push(makeHiddenLevel());
      }

      function currentLevel() {
        return state.levels[state.currentLevelIndex];
      }

      function resetPlayer(level) {
        state.player.x = level.start.x;
        state.player.y = level.start.y;
        state.player.vx = 0;
        state.player.vy = 0;
        state.player.onGround = true;
        state.player.onLadder = false;
        state.player.justJumped = false;
      }

      function resetLevel() {
        const level = currentLevel();
        state.levelTime = 0;
        level.lightState = level.id % 2 === 0 ? 'dark' : 'bright';
        if (level.isHidden) {
          level.lightState = 'dark';
        }
        resetPlayer(level);
        tipText.textContent = level.hint;
      }

      function onSwitchTouched() {
        const level = currentLevel();
        level.lightState = level.lightState === 'bright' ? 'dark' : 'bright';
      }

      function levelPlatforms(level) {
        const dynamic = level.lightState === 'bright' ? level.bright : level.dark;
        return [...level.fixed, ...dynamic, ...level.movingPlatforms];
      }

      function updateMovingPlatforms(level, dt) {
        for (const m of level.movingPlatforms) {
          m.x += m.speed * m.dir * dt;
          if (m.x <= m.minX) {
            m.x = m.minX;
            m.dir = 1;
          } else if (m.x >= m.maxX) {
            m.x = m.maxX;
            m.dir = -1;
          }
        }
      }

      function handleInput(dt) {
        const p = state.player;
        const move = (keys.a ? -1 : 0) + (keys.d ? 1 : 0);

        if (move !== 0) {
          p.facing = move;
        }

        p.vx = move * PLAYER.moveSpeed;

        if (p.onLadder) {
          p.vy = 0;
          if (keys.w) p.vy = -PLAYER.climbSpeed;
          if (keys.s) p.vy = PLAYER.climbSpeed;
        } else {
          p.vy += WORLD.gravity * dt;
          p.vy = Math.min(p.vy, U(140));
        }
      }

      function jump() {
        const p = state.player;
        if (state.gameEnded) return;
      }

      function checkLadders(level) {
        const pRect = { x: state.player.x, y: state.player.y, w: PLAYER.w, h: PLAYER.h };
        let touchingLadder = false;
        for (const l of level.ladders) {
          if (rectIntersect(pRect, l)) {
            touchingLadder = true;
            break;
          }
        }
        const p = state.player;
        if (touchingLadder && (keys.w || keys.s)) {
          p.onLadder = true;
          p.vy = 0;
        }
        if (!touchingLadder) {
          p.onLadder = false;
        }
      }

      function moveAndCollide(level, dt) {
        const p = state.player;
        const solids = levelPlatforms(level);

        p.x += p.vx * dt;
        let pRect = { x: p.x, y: p.y, w: PLAYER.w, h: PLAYER.h };
        for (const s of solids) {
          if (rectIntersect(pRect, s)) {
            if (p.vx > 0) {
              p.x = s.x - PLAYER.w;
            } else if (p.vx < 0) {
              p.x = s.x + s.w;
            }
            pRect.x = p.x;
          }
        }

        p.y += p.vy * dt;
        p.onGround = false;
        pRect = { x: p.x, y: p.y, w: PLAYER.w, h: PLAYER.h };

        for (const s of solids) {
          if (rectIntersect(pRect, s)) {
            if (p.vy > 0) {
              p.y = s.y - PLAYER.h;
              p.vy = 0;
              p.onGround = true;
            } else if (p.vy < 0) {
              p.y = s.y + s.h;
              p.vy = 20;
            }
            pRect.y = p.y;
          }
        }

        p.x = clamp(p.x, 0, WORLD.width - PLAYER.w);
        p.y = clamp(p.y, 0, WORLD.height - PLAYER.h);
      }

      function updateSwitches(level) {
        const pRect = { x: state.player.x, y: state.player.y, w: PLAYER.w, h: PLAYER.h };
        let nearSwitch = null;
        for (const sw of level.switches) {
          if (rectIntersect(pRect, { x: sw.x - U(2), y: sw.y - U(2), w: sw.w + U(4), h: sw.h + U(4) })) {
            nearSwitch = sw;
            if (keys.f) {
              level.lightState = level.lightState === 'bright' ? 'dark' : 'bright';
              keys.f = false;
            }
            break;
          }
        }
        state.nearSwitch = nearSwitch;
      }

      function checkExit(level) {
        const pRect = { x: state.player.x, y: state.player.y, w: PLAYER.w, h: PLAYER.h };
        if (!rectIntersect(pRect, level.exit)) return;

        const light = level.lightState;
        if (!level.isHidden) {
          state.clearStates[state.currentLevelIndex] = light;
        }

        if (!level.isHidden && state.currentLevelIndex < TOTAL_NORMAL_LEVELS - 1) {
          state.currentLevelIndex += 1;
          resetLevel();
          return;
        }

        if (!level.isHidden && state.currentLevelIndex === TOTAL_NORMAL_LEVELS - 1) {
          state.hiddenUnlocked = canUnlockHidden();
          if (state.hiddenUnlocked) {
            tipText.textContent = '已解锁隐藏关！继续前进至第 32 关。';
            state.currentLevelIndex = 31;
            resetLevel();
          } else {
            state.gameEnded = true;
            tipText.textContent = '普通结局：31 关完成。未满足隐藏关解锁条件，可重试追求隐藏关。';
          }
          return;
        }

        if (level.isHidden) {
          state.rewardUnlocked = true;
          state.gameEnded = true;
          tipText.textContent = '隐藏关完成！你获得了"背景中的灯"奖励。';
        }
      }

      function canUnlockHidden() {
        const all = state.clearStates;
        if (all.some((v) => v === null)) return false;
        const seq31 = all.map((s) => (s === 'bright' ? '.' : '-')).join('');
        return seq31 === morseTarget31;
      }

      function updateCamera() {
        state.cameraX = 0;
        state.cameraY = 0;
      }

      function updateHud() {
        const level = currentLevel();
        const maxLevel = level.isHidden ? TOTAL_LEVELS : TOTAL_NORMAL_LEVELS;
        playerText.textContent = state.playerName || '未开始';
        levelText.textContent = `${level.id}/${maxLevel}`;
        lightText.textContent = level.lightState === 'bright' ? '明' : '暗';
        levelTimerText.textContent = `${state.levelTime.toFixed(1)}s`;
        totalTimerText.textContent = `${state.totalTime.toFixed(1)}s`;
      }

      function drawRect(r, fill, stroke = null) {
        ctx.fillStyle = fill;
        ctx.fillRect(r.x - state.cameraX, r.y - state.cameraY, r.w, r.h);
        if (stroke) {
          ctx.strokeStyle = stroke;
          ctx.lineWidth = 2;
          ctx.strokeRect(r.x - state.cameraX, r.y - state.cameraY, r.w, r.h);
        }
      }

      function drawStickman() {
        const p = state.player;
        const level = currentLevel();
        const x = p.x - state.cameraX;
        const y = p.y - state.cameraY;
        const c = level.lightState === 'bright' ? '#000' : '#fff';

        ctx.strokeStyle = c;
        ctx.fillStyle = c;
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.arc(x + PLAYER.w / 2, y + 12, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(x + PLAYER.w / 2, y + 20);
        ctx.lineTo(x + PLAYER.w / 2, y + 42);
        ctx.stroke();

        const handSwing = p.onGround ? (Math.sin(performance.now() * 0.02) * 5) : 0;
        ctx.beginPath();
        ctx.moveTo(x + PLAYER.w / 2, y + 28);
        ctx.lineTo(x + PLAYER.w / 2 - 10 - handSwing, y + 34);
        ctx.moveTo(x + PLAYER.w / 2, y + 28);
        ctx.lineTo(x + PLAYER.w / 2 + 10 + handSwing, y + 34);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x + PLAYER.w / 2, y + 42);
        ctx.lineTo(x + PLAYER.w / 2 - 9, y + 58);
        ctx.moveTo(x + PLAYER.w / 2, y + 42);
        ctx.lineTo(x + PLAYER.w / 2 + 9, y + 58);
        ctx.stroke();
      }

      function drawLamp(level) {
        const lamp = { x: 400, y: 20, w: 100, h: 100 };
        const cx = lamp.x - state.cameraX + lamp.w / 2;
        const cy = lamp.y - state.cameraY + lamp.h / 2;
        const isBright = level.lightState === 'bright' || state.rewardUnlocked;

        ctx.save();
        if (isBright) {
          const g = ctx.createRadialGradient(cx, cy, 10, cx, cy, 200);
          g.addColorStop(0, 'rgba(255,255,255,0.35)');
          g.addColorStop(1, 'rgba(255,255,255,0.02)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(cx, cy, 200, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = isBright ? '#000' : '#333';
        ctx.fillRect(lamp.x - state.cameraX, lamp.y - state.cameraY, lamp.w, lamp.h);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.strokeRect(lamp.x - state.cameraX, lamp.y - state.cameraY, lamp.w, lamp.h);

        ctx.beginPath();
        ctx.arc(cx, cy, 20, 0, Math.PI * 2);
        ctx.fillStyle = isBright ? '#fff' : '#555';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.stroke();
        ctx.restore();
      }

      function drawExit(level) {
        const e = level.exit;
        const isBright = level.lightState === 'bright';
        drawRect(e, isBright ? '#000' : '#fff', '#fff');
        ctx.fillStyle = isBright ? '#fff' : '#000';
        ctx.font = '16px Consolas';
        ctx.fillText('EXIT', e.x - state.cameraX - 4, e.y - state.cameraY - 8);
      }

      function drawLevel() {
        const level = currentLevel();
        const isBright = level.lightState === 'bright';

        ctx.fillStyle = isBright ? '#fff' : '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawLamp(level);

        for (const f of level.fixed) {
          drawRect(f, isBright ? '#000' : '#fff', '#fff');
        }

        for (const b of level.bright) {
          const active = isBright;
          if (active) {
            drawRect(b, '#000', '#fff');
          }
        }
        for (const d of level.dark) {
          const active = !isBright;
          if (active) {
            drawRect(d, '#fff', '#fff');
          }
        }

        for (const m of level.movingPlatforms) {
          drawRect(m, isBright ? '#000' : '#fff', '#fff');
        }

        for (const l of level.ladders) {
          drawRect(l, isBright ? '#000' : '#fff', '#fff');
          for (let y = l.y + 6; y < l.y + l.h; y += 16) {
            ctx.strokeStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(l.x - state.cameraX, y - state.cameraY);
            ctx.lineTo(l.x + l.w - state.cameraX, y - state.cameraY);
            ctx.stroke();
          }
        }

        for (const sw of level.switches) {
          drawRect(sw, isBright ? '#000' : '#fff', '#fff');
          ctx.fillStyle = isBright ? '#fff' : '#000';
          ctx.beginPath();
          ctx.arc(sw.x + sw.w / 2 - state.cameraX, sw.y + 10 - state.cameraY, 6, 0, Math.PI * 2);
          ctx.fill();
        }

        drawExit(level);
        drawStickman();

        if (state.gameEnded) {
          ctx.fillStyle = 'rgba(0,0,0,0.72)';
          ctx.fillRect(120, 160, 720, 220);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 4;
          ctx.strokeRect(120, 160, 720, 220);
          ctx.fillStyle = '#fff';
          ctx.font = '26px Consolas';
          if (state.rewardUnlocked) {
            ctx.fillText('隐藏结局达成：获得背景中的灯', 150, 250);
          } else {
            ctx.fillText('普通结局：31关通关完成', 220, 250);
          }
          ctx.font = '18px Consolas';
          ctx.fillText('点击"重置本关"可继续尝试', 310, 300);
        }
      }

      function update(dt) {
        if (!state.gameStarted) {
          updateHud();
          return;
        }

        if (state.gameEnded) {
          updateHud();
          return;
        }

        const level = currentLevel();

        state.totalTime += dt;
        state.levelTime += dt;

        updateMovingPlatforms(level, dt);
        checkLadders(level);
        handleInput(dt);
        moveAndCollide(level, dt);
        jump();
        updateSwitches(level);
        checkExit(level);
        updateCamera();
        updateHud();
      }

      let last = performance.now();
      function loop(now) {
        const dt = Math.min((now - last) / 1000, 0.033);
        last = now;
        update(dt);
        drawLevel();
        requestAnimationFrame(loop);
      }

      function onKey(e, down) {
        if (!state.gameStarted) {
          if (e.key === ' ') e.preventDefault();
          return;
        }

        const k = e.key.toLowerCase();
        if (k === 'a') keys.a = down;
        if (k === 'd') keys.d = down;
        if (k === 'w') keys.w = down;
        if (k === 's') keys.s = down;
        if (k === ' ') {
          if (down) {
            const p = state.player;
            if (!state.gameEnded && (p.onGround || p.onLadder)) {
              p.vy = -PLAYER.jumpSpeed;
              p.onGround = false;
              p.onLadder = false;
            }
          }
          e.preventDefault();
        }
        if (k === 'f') keys.f = down;
      }

      window.addEventListener('keydown', (e) => onKey(e, true));
      window.addEventListener('keyup', (e) => onKey(e, false));

      resetBtn.addEventListener('click', () => {
        if (!state.gameStarted) return;
        state.gameEnded = false;
        if (!state.hiddenUnlocked && state.currentLevelIndex === 31) {
          state.currentLevelIndex = 0;
          state.clearStates = Array(TOTAL_NORMAL_LEVELS).fill(null);
          state.totalTime = 0;
        }
        resetLevel();
      });

      function startGame() {
        const name = (playerNameInput.value || '').trim();
        if (!name) {
          playerNameInput.focus();
          return;
        }
        state.playerName = name;
        state.gameStarted = true;
        state.gameEnded = false;
        startOverlay.classList.add('hidden');
        tipText.textContent = `欢迎你，${name}。A/D 移动，空格跳跃，F 切换明暗。`;
        state.totalTime = 0;
        resetLevel();
        updateHud();
      }

      startGameBtn.addEventListener('click', startGame);
      playerNameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          startGame();
        }
      });

      buildLevels();
      resetLevel();
      updateHud();
      playerNameInput.focus();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
